name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: node scripts/bench.js
      - name: Fail if benchmark gate missed
        run: |
          node -e "
            const r = JSON.parse(require('fs').readFileSync('scripts/bench-results/latest.json', 'utf8'));
            console.log('P90 fps:', r.p90fps, '| gate:', r.gate, '| passed:', r.passed);
            if (!r.passed) process.exit(1);
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results
          path: scripts/bench-results/latest.json

  eval-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node scripts/eval-links.js
        continue-on-error: true
